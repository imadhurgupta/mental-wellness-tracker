{% extends 'base.html' %}
{% block title %}Log In - MindSpace{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="glass-card auth-card">
        <div class="auth-header">
            <div class="brand-icon">
                <svg viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m11.314 11.314l.707.707M12 5a7 7 0 100 14 7 7 0 000-14z" />
                </svg>
            </div>
            <h2>Welcome to MindSpace</h2>
            <p>Your mental well-being companion during exams</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST">
            <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="Enter your username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn-submit" style="width: 100%; margin-top: 1rem;">Log In</button>
        </form>
        
        <div class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
